<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Coffee Chat — TMO</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f3;--bg3:#ebebea;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#aaa;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.22);
  --r-md:8px;--r-lg:12px;
  --green:#1D9E75;--green-bg:#E1F5EE;--green-text:#085041;
  --amber-bg:#FAEEDA;--amber-text:#633806;
  --blue-bg:#E6F1FB;--blue-text:#0C447C;
  --red-bg:#FCEBEB;--red-text:#A32D2D;
  --slack:#4A154B;
}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--text:#f0f0f0;--text2:#9a9a9a;--text3:#555;--border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.2)}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── Login screen ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.login-card{width:100%;max-width:400px;border:0.5px solid var(--border);border-radius:var(--r-lg);padding:2rem;background:var(--bg)}
.login-logo{font-size:32px;margin-bottom:4px}
.login-title{font-size:20px;font-weight:500;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:1.5rem}
.login-label{font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;display:block}
.login-input{width:100%;padding:10px 12px;font-size:14px;border:0.5px solid var(--border2);border-radius:var(--r-md);background:var(--bg);color:var(--text);font-family:inherit;margin-bottom:12px}
.login-input:focus{outline:none;border-color:var(--text)}
.login-btn{width:100%;padding:10px;font-size:14px;font-weight:500;border:none;border-radius:var(--r-md);cursor:pointer;font-family:inherit;transition:all .15s}
.login-btn-primary{background:var(--text);color:var(--bg)}
.login-btn-primary:hover{opacity:.85}
.login-btn-secondary{background:var(--bg2);color:var(--text);border:0.5px solid var(--border2);margin-top:8px}
.login-btn-secondary:hover{background:var(--bg3)}
.login-error{font-size:12px;color:var(--red-text);margin-top:6px;margin-bottom:4px}
.login-divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--text3);font-size:12px}
.login-divider::before,.login-divider::after{content:'';flex:1;height:0.5px;background:var(--border)}
.pin-row{display:flex;gap:10px;justify-content:center;margin-bottom:12px}
.pin-input{width:52px;height:58px;text-align:center;font-size:24px;font-weight:500;border:0.5px solid var(--border2);border-radius:var(--r-md);background:var(--bg);color:var(--text);font-family:inherit}
.pin-input:focus{outline:none;border-color:var(--text)}
.back-link{font-size:13px;color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:4px;margin-top:12px;background:none;border:none;font-family:inherit}
.back-link:hover{color:var(--text)}

/* ── App ── */
.app-wrap{display:none}
.container{max-width:900px;margin:0 auto;padding:2rem 1.5rem 4rem}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
h1{font-size:22px;font-weight:500}
.subtitle{font-size:13px;color:var(--text2);margin-bottom:1.5rem}
.role-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:12px;font-weight:500}
.role-admin{background:#EEEDFE;color:#3C3489}
.role-user{background:var(--green-bg);color:var(--green-text)}
.tabs{display:flex;gap:2px;border-bottom:0.5px solid var(--border);margin-bottom:1.5rem;overflow-x:auto}
.tab{padding:8px 16px;font-size:14px;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .15s;white-space:nowrap;flex-shrink:0}
.tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500}
.tab:hover:not(.active){color:var(--text)}
.section{display:none}.section.active{display:block}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:1rem 1.25rem;margin-bottom:1rem}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.card-title{font-size:15px;font-weight:500}
.card-sub{font-size:12px;color:var(--text2);margin-top:2px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.stat{background:var(--bg2);border-radius:var(--r-md);padding:12px;text-align:center}
.stat-num{font-size:22px;font-weight:500}
.stat-label{font-size:11px;color:var(--text2);margin-top:2px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;font-size:13px;font-weight:500;border:0.5px solid var(--border2);border-radius:var(--r-md);cursor:pointer;background:var(--bg);color:var(--text);font-family:inherit;transition:all .15s;white-space:nowrap;text-decoration:none}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--text);color:var(--bg);border-color:var(--text)}
.btn-primary:hover{opacity:.82}
.btn-slack{background:var(--slack);color:#fff;border-color:var(--slack)}
.btn-slack:hover{opacity:.85}
.btn-green{background:var(--green-bg);color:var(--green-text);border-color:var(--green)}
.btn-green:hover{opacity:.85}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center}
.input{width:100%;padding:7px 10px;font-size:13px;border:0.5px solid var(--border2);border-radius:var(--r-md);background:var(--bg);color:var(--text);font-family:inherit}
.input:focus{outline:none;border-color:var(--text)}
select.input{cursor:pointer}
textarea.input{resize:vertical;min-height:80px}

/* Pair card */
.pair-card{display:flex;align-items:flex-start;gap:12px;padding:1rem 1.25rem;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r-lg);margin-bottom:10px}
.pair-card.connected{border-color:var(--green);background:var(--green-bg)}
.pair-card.mine{border-color:#7B61FF;background:#F3F0FF}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0}
.pair-names{font-size:14px;font-weight:500;margin-bottom:3px}
.pair-meta{font-size:12px;color:var(--text2);margin-bottom:8px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.question-box{background:var(--bg2);border-radius:var(--r-md);padding:9px 12px;font-size:13px;color:var(--text2);border-left:3px solid}
.q-cat-label{font-size:11px;font-weight:500;display:block;margin-bottom:2px}
.badge{display:inline-block;padding:2px 7px;border-radius:999px;font-size:11px;font-weight:500}
.badge-purple{background:#EEEDFE;color:#3C3489}
.badge-teal{background:#E1F5EE;color:#085041}
.badge-coral{background:#FAECE7;color:#712B13}
.badge-blue{background:#E6F1FB;color:#0C447C}
.badge-amber{background:#FAEEDA;color:#633806}
.badge-pink{background:#FBEAF0;color:#72243E}
.badge-gray{background:#F1EFE8;color:#5F5E5A}

/* My profile */
.profile-hero{text-align:center;padding:2rem 1rem 1.5rem;border:0.5px solid var(--border);border-radius:var(--r-lg);margin-bottom:1rem;background:var(--bg2)}
.profile-avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:500;margin:0 auto 12px}
.profile-name{font-size:18px;font-weight:500;margin-bottom:4px}
.profile-email{font-size:13px;color:var(--text2);margin-bottom:8px}
.my-pair-card{border:2px solid #7B61FF;border-radius:var(--r-lg);padding:1.25rem;background:#F3F0FF}
.my-pair-title{font-size:12px;font-weight:500;color:#7B61FF;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}

/* Emp table */
.emp-table{width:100%;border-collapse:collapse}
.emp-table th{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;padding:8px 10px;text-align:left;border-bottom:0.5px solid var(--border);background:var(--bg2)}
.emp-table td{padding:8px 10px;font-size:13px;border-bottom:0.5px solid var(--border);vertical-align:middle}
.emp-table tr:last-child td{border-bottom:none}
.emp-table tr:hover td{background:var(--bg2)}
.emp-email{color:var(--text2);font-size:12px}
.pill-in{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:500;background:#E1F5EE;color:#085041;cursor:pointer;border:none;font-family:inherit}
.pill-out{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:500;background:#F1EFE8;color:#5F5E5A;cursor:pointer;border:none;font-family:inherit}
.pill-in:hover{background:#9FE1CB}.pill-out:hover{background:#D3D1C7}
.invite-btn{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:var(--r-md);font-size:11px;font-weight:500;background:var(--bg2);color:var(--blue-text);border:0.5px solid var(--blue-text);cursor:pointer;font-family:inherit;text-decoration:none}
.invite-btn:hover{background:var(--blue-bg)}

/* Approve */
.approve-table{width:100%;border-collapse:collapse}
.approve-table th{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;padding:8px 10px;text-align:left;border-bottom:0.5px solid var(--border);background:var(--bg2)}
.approve-table td{padding:7px 10px;font-size:13px;border-bottom:0.5px solid var(--border);vertical-align:middle}
.approve-table tr:last-child td{border-bottom:none}
.approve-table tr.approved td{background:var(--green-bg)}
.approve-table tr:hover td{background:var(--bg2)}
.approve-table tr.approved:hover td{background:#c5ede0}
.cb{width:16px;height:16px;cursor:pointer;accent-color:var(--green)}

/* Search */
.search-row{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:160px}
.search-wrap .ti{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--text2);pointer-events:none}
.search-input{width:100%;padding:7px 10px 7px 32px;font-size:13px;border:0.5px solid var(--border2);border-radius:var(--r-md);background:var(--bg);color:var(--text);font-family:inherit}
.search-input:focus{outline:none;border-color:var(--text)}

/* Slack status */
.slack-status{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--r-md);font-size:13px;margin-bottom:1rem}
.slack-status.ok{background:var(--green-bg);color:var(--green-text)}
.slack-status.warn{background:var(--amber-bg);color:var(--amber-text)}
.slack-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-ok{background:var(--green)}.dot-warn{background:#E67E22}

/* Reminder / connected badges */
.reminder-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:999px;font-size:11px;font-weight:500;background:var(--amber-bg);color:var(--amber-text)}
.connected-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:999px;font-size:11px;font-weight:500;background:var(--green-bg);color:var(--green-text)}

/* Settings */
.settings-row{display:flex;flex-direction:column;gap:4px;margin-bottom:1rem}
.settings-label{font-size:13px;font-weight:500}
.settings-hint{font-size:12px;color:var(--text2)}

/* Q items */
.q-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--border)}
.q-item:last-child{border-bottom:none}

/* Progress */
.progress-bar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}

/* Toast */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);border-radius:var(--r-md);padding:9px 16px;font-size:13px;display:none;align-items:center;gap:8px;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.18)}
.toast-success{background:#1a1a1a;color:#fff}
.toast-error{background:#A32D2D;color:#fff}
.toast-info{background:var(--slack);color:#fff}

.legend{display:flex;gap:16px;font-size:12px;color:var(--text2);margin-bottom:12px;flex-wrap:wrap;align-items:center}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.empty{text-align:center;padding:2rem;color:var(--text2);font-size:14px}
.muted{color:var(--text3);font-style:italic}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <!-- Step 1: Email -->
    <div id="step-email">
      <div class="login-logo">☕</div>
      <div class="login-title">Coffee Chat</div>
      <div class="login-sub">TMO internal · Enter your work email to continue</div>
      <label class="login-label">Work email</label>
      <input class="login-input" id="login-email" type="email" placeholder="you@themortgageoffice.com" onkeydown="if(event.key==='Enter')submitEmail()" />
      <div class="login-error" id="email-error" style="display:none"></div>
      <button class="login-btn login-btn-primary" onclick="submitEmail()">Continue</button>
    </div>

    <!-- Step 2: Role chooser -->
    <div id="step-role" style="display:none">
      <div class="login-logo">👋</div>
      <div class="login-title" id="role-greeting"></div>
      <div class="login-sub">How would you like to sign in?</div>
      <button class="login-btn login-btn-primary" onclick="loginAsUser()">Continue as member</button>
      <div class="login-divider">or</div>
      <button class="login-btn login-btn-secondary" onclick="showPinStep()"><i class="ti ti-shield-lock"></i> Sign in as admin</button>
      <br>
      <button class="back-link" onclick="backToEmail()"><i class="ti ti-arrow-left"></i> Back</button>
    </div>

    <!-- Step 3: PIN -->
    <div id="step-pin" style="display:none">
      <div class="login-logo">🔐</div>
      <div class="login-title">Admin PIN</div>
      <div class="login-sub">Enter the 4-digit admin PIN</div>
      <div class="pin-row">
        <input class="pin-input" id="pin-1" type="password" inputmode="numeric" maxlength="1" oninput="pinNext(this,2)" onkeydown="pinKey(event,this,0)" />
        <input class="pin-input" id="pin-2" type="password" inputmode="numeric" maxlength="1" oninput="pinNext(this,3)" onkeydown="pinKey(event,this,1)" />
        <input class="pin-input" id="pin-3" type="password" inputmode="numeric" maxlength="1" oninput="pinNext(this,4)" onkeydown="pinKey(event,this,2)" />
        <input class="pin-input" id="pin-4" type="password" inputmode="numeric" maxlength="1" oninput="submitPin()" onkeydown="pinKey(event,this,3)" />
      </div>
      <div class="login-error" id="pin-error" style="display:none">Incorrect PIN. Try again.</div>
      <button class="back-link" onclick="showRoleStep()"><i class="ti ti-arrow-left"></i> Back</button>
    </div>
  </div>
</div>

<!-- ── APP ── -->
<div class="app-wrap" id="app-wrap">
  <div class="container">
    <div class="topbar">
      <h1>☕ Coffee Chat</h1>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="role-badge" id="role-badge"></span>
        <span id="user-name-display" style="font-size:13px;color:var(--text2)"></span>
        <button class="btn btn-sm" onclick="logout()"><i class="ti ti-logout"></i> Sign out</button>
      </div>
    </div>
    <p class="subtitle" id="app-subtitle"></p>
    <div id="slack-bar"></div>
    <div class="tabs" id="tab-bar"></div>
    <div id="sec-pairs" class="section"></div>
    <div id="sec-profile" class="section"></div>
    <div id="sec-approve" class="section"></div>
    <div id="sec-employees" class="section"></div>
    <div id="sec-questions" class="section"></div>
    <div id="sec-settings" class="section"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const TEAM_COLORS={Sales:'badge-purple',Engineering:'badge-blue',Marketing:'badge-coral','Customer Success':'badge-teal',Operations:'badge-amber',Product:'badge-pink',Finance:'badge-gray',HR:'badge-teal',Support:'badge-teal',Design:'badge-pink','Vital Design':'badge-pink',Leadership:'badge-amber',Legal:'badge-gray',DevOps:'badge-blue'};
const AVATAR_STYLES=[['#EEEDFE','#3C3489'],['#E6F1FB','#0C447C'],['#FAECE7','#712B13'],['#E1F5EE','#085041'],['#FAEEDA','#633806'],['#FBEAF0','#72243E'],['#F1EFE8','#5F5E5A']];
const CAT_COLORS={Work:'#185FA5',Personal:'#0F6E56',Fun:'#BA7517',Career:'#533AB7','Cross-team':'#993556'};
const TEAMS=['Sales','Engineering','Marketing','Customer Success','Operations','Product','Finance','HR','Support','Design','Vital Design','Leadership','Legal','DevOps'];
const DEFAULT_DM=`Hi {name1} and {name2}! ☕\n\nYou've been paired for a coffee chat this month!\n\nFind 20-30 minutes to connect and use this question as a conversation starter:\n\n*"{question}"*\n\nReach out to each other to schedule: {email1} / {email2}\n\nHave a great chat!`;
const DEFAULT_REMINDER=`Hey {name1} and {name2} 👋\n\nJust a friendly reminder — you were paired for a coffee chat a few days ago. Have you had a chance to connect yet?\n\nIf not, now's a great time! Your icebreaker: *"{question}"*`;
const QUESTIONS=[
  {text:"What's one thing you're working on right now that you're excited about?",cat:"Work"},
  {text:"If you could swap roles with anyone at the company for a day, who would it be and why?",cat:"Work"},
  {text:"What's the most surprising thing you've learned since joining the team?",cat:"Work"},
  {text:"What does a great Monday morning look like for you?",cat:"Work"},
  {text:"What's a skill you have that most people here don't know about?",cat:"Personal"},
  {text:"If you could travel anywhere in the next 6 months, where would you go?",cat:"Personal"},
  {text:"What's a book, podcast, or show you've been into lately?",cat:"Personal"},
  {text:"What's your go-to order when the team does coffee or lunch?",cat:"Personal"},
  {text:"What hobby or side project are you currently obsessed with?",cat:"Personal"},
  {text:"If your team had a theme song, what would it be?",cat:"Fun"},
  {text:"What's the most underrated city you've ever visited?",cat:"Fun"},
  {text:"What app on your phone do you think is genuinely underrated?",cat:"Fun"},
  {text:"What's a career lesson you had to learn the hard way?",cat:"Career"},
  {text:"What's something you wish you'd known before starting in your current role?",cat:"Career"},
  {text:"Who's been the most influential person in your career so far?",cat:"Career"},
  {text:"If you could add one thing to how our teams collaborate, what would it be?",cat:"Cross-team"},
  {text:"What does your team do that you think other teams don't fully see or appreciate?",cat:"Cross-team"},
  {text:"What's a challenge your team is facing that you think another team might have insight on?",cat:"Cross-team"},
];

// ── State ─────────────────────────────────────────────────────────────────────
let currentUser=null; // {email, name, role:'admin'|'user'}
let pairs=[];
let questions=[...QUESTIONS];
let approveChecked=new Set();

let employees=[
  {name:"Adam Loughran",email:"aloughran@themortgageoffice.com",team:"",in:false},
  {name:"Akhil Sahai",email:"asahai@themortgageoffice.com",team:"",in:false},
  {name:"Alex Ho",email:"alexho@themortgageoffice.com",team:"",in:false},
  {name:"Andrei Yakovlev",email:"ayakovlev@themortgageoffice.com",team:"",in:false},
  {name:"Andres Quintana",email:"aquintana@themortgageoffice.com",team:"",in:false},
  {name:"Andres Rodriguez",email:"arodriguez@themortgageoffice.com",team:"",in:false},
  {name:"Andrew Bermudez",email:"abermudez@themortgageoffice.com",team:"",in:false},
  {name:"Anthony Licas",email:"alicas@themortgageoffice.com",team:"",in:false},
  {name:"Audrey Nimtz",email:"audrey@vitaldesign.com",team:"Vital Design",in:false},
  {name:"Ben Cheung",email:"bcheung@themortgageoffice.com",team:"",in:false},
  {name:"Ben Vigil",email:"bvigil@themortgageoffice.com",team:"Operations",in:false},
  {name:"Bobby Luedtke",email:"bluedtke@themortgageoffice.com",team:"",in:false},
  {name:"Brett Lawrence",email:"blawrence@themortgageoffice.com",team:"",in:false},
  {name:"Brian Krotine",email:"bkrotine@themortgageoffice.com",team:"",in:false},
  {name:"Cameron Larsen",email:"clarsen@themortgageoffice.com",team:"Engineering",in:false},
  {name:"Carlos Nodarse",email:"carlos@themortgageoffice.com",team:"",in:false},
  {name:"Chad Cuervo",email:"ccuervo@themortgageoffice.com",team:"",in:false},
  {name:"Charlie Gale",email:"cgale@themortgageoffice.com",team:"",in:false},
  {name:"Chelsea Burke-Gomez",email:"cburkegomez@themortgageoffice.com",team:"Sales",in:false},
  {name:"Cody Snyder",email:"csnyder@themortgageoffice.com",team:"",in:false},
  {name:"Dani McIntire",email:"dmcintire@themortgageoffice.com",team:"",in:false},
  {name:"Danielle Moore",email:"dmoore@themortgageoffice.com",team:"",in:false},

// ── Settings ──────────────────────────────────────────────────────────────────
function loadSettings(){
  return {
    token:localStorage.getItem('cc_token')||'',
    channel:localStorage.getItem('cc_channel')||'coffee-chat',
    reminderDays:parseInt(localStorage.getItem('cc_reminder_days')||'3'),
    dmTemplate:localStorage.getItem('cc_dm_template')||DEFAULT_DM,
    reminderTemplate:localStorage.getItem('cc_reminder_template')||DEFAULT_REMINDER,
    adminPin:localStorage.getItem('cc_admin_pin')||'1234',
  };
}
function saveSettings(){
  localStorage.setItem('cc_token',document.getElementById('slack-token').value);
  localStorage.setItem('cc_channel',document.getElementById('slack-channel').value);
  localStorage.setItem('cc_reminder_days',document.getElementById('reminder-days').value);
  localStorage.setItem('cc_dm_template',document.getElementById('dm-template').value);
  localStorage.setItem('cc_reminder_template',document.getElementById('reminder-template').value);
  const np=document.getElementById('new-pin').value.trim();
  if(np.length===4&&/^\d{4}$/.test(np)){
    localStorage.setItem('cc_admin_pin',np);
    document.getElementById('pin-save-msg').textContent='PIN updated.';
    document.getElementById('new-pin').value='';
    setTimeout(()=>document.getElementById('pin-save-msg').textContent='',2000);
  }
  renderSlackBar();
  showToast('Settings saved.');
}

// ── Login flow ────────────────────────────────────────────────────────────────
let loginEmail='';

function submitEmail(){
  const val=document.getElementById('login-email').value.trim().toLowerCase();
  const err=document.getElementById('email-error');
  if(!val||!val.includes('@')){err.textContent='Enter a valid email.';err.style.display='block';return;}
  const match=employees.find(e=>e.email.toLowerCase()===val);
  if(!match){err.textContent='Email not found in the roster. Contact your admin.';err.style.display='block';return;}
  err.style.display='none';
  loginEmail=val;
  document.getElementById('role-greeting').textContent='Hey, '+match.name.split(' ')[0]+'!';
  document.getElementById('step-email').style.display='none';
  document.getElementById('step-role').style.display='block';
}

function backToEmail(){
  document.getElementById('step-role').style.display='none';
  document.getElementById('step-email').style.display='block';
}

function showRoleStep(){
  document.getElementById('step-pin').style.display='none';
  document.getElementById('step-role').style.display='block';
  clearPin();
}

function showPinStep(){
  document.getElementById('step-role').style.display='none';
  document.getElementById('step-pin').style.display='block';
  setTimeout(()=>document.getElementById('pin-1').focus(),50);
}

function pinNext(el,next){
  if(el.value&&next<=4) document.getElementById('pin-'+next).focus();
}
function pinKey(e,el,idx){
  if(e.key==='Backspace'&&!el.value&&idx>0) document.getElementById('pin-'+(idx)).focus();
}
function clearPin(){
  [1,2,3,4].forEach(i=>{document.getElementById('pin-'+i).value='';});
  document.getElementById('pin-error').style.display='none';
}
function getPin(){
  return [1,2,3,4].map(i=>document.getElementById('pin-'+i).value).join('');
}
function submitPin(){
  const pin=getPin();
  if(pin.length<4)return;
  const s=loadSettings();
  if(pin===s.adminPin){
    loginAs('admin');
  } else {
    document.getElementById('pin-error').style.display='block';
    clearPin();
    document.getElementById('pin-1').focus();
  }
}

function loginAsUser(){ loginAs('user'); }

function loginAs(role){
  const emp=employees.find(e=>e.email.toLowerCase()===loginEmail);
  currentUser={email:loginEmail,name:emp?emp.name:loginEmail,role};
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('app-wrap').style.display='block';
  buildApp();
}

function logout(){
  currentUser=null;
  document.getElementById('app-wrap').style.display='none';
  document.getElementById('login-wrap').style.display='flex';
  document.getElementById('login-email').value='';
  document.getElementById('step-email').style.display='block';
  document.getElementById('step-role').style.display='none';
  document.getElementById('step-pin').style.display='none';
  clearPin();
}

// ── App builder ───────────────────────────────────────────────────────────────
function buildApp(){
  const isAdmin=currentUser.role==='admin';
  // Badge
  document.getElementById('role-badge').className='role-badge '+(isAdmin?'role-admin':'role-user');
  document.getElementById('role-badge').textContent=isAdmin?'Admin':'Member';
  document.getElementById('user-name-display').textContent=currentUser.name;
  document.getElementById('app-subtitle').textContent=isAdmin
    ? 'Admin view · Full access'
    : 'Member view · '+currentUser.name;

  // Build tabs
  const tabBar=document.getElementById('tab-bar');
  if(isAdmin){
    tabBar.innerHTML=`
      <button class="tab active" onclick="switchTab('pairs')">Pairings</button>
      <button class="tab" onclick="switchTab('approve')">Approve Members</button>
      <button class="tab" onclick="switchTab('employees')">Employees</button>
      <button class="tab" onclick="switchTab('questions')">Questions</button>
      <button class="tab" onclick="switchTab('settings')">⚙ Settings</button>`;
  } else {
    tabBar.innerHTML=`
      <button class="tab active" onclick="switchTab('pairs')">Pairings</button>
      <button class="tab" onclick="switchTab('profile')">My Profile</button>`;
  }

  // Render initial content
  renderSlackBar();
  renderPairsSection(isAdmin);
  if(isAdmin){
    renderApprove();
    renderEmployees();
    renderQuestions();
    renderSettings();
    updateStats();
  } else {
    renderProfile();
  }
  switchTab('pairs');
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach(el=>{
    el.classList.toggle('active',el.getAttribute('onclick').includes("'"+t+"'"));
  });
  ['pairs','profile','approve','employees','questions','settings'].forEach(s=>{
    const el=document.getElementById('sec-'+s);
    if(el) el.classList.toggle('active',s===t);
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function initials(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
function avatarDiv(name,idx,size){const s=AVATAR_STYLES[idx%AVATAR_STYLES.length];const sz=size||34;return`<div class="avatar" style="width:${sz}px;height:${sz}px;background:${s[0]};color:${s[1]}">${initials(name)}</div>`}
function teamBadge(t){if(!t)return`<span class="badge badge-gray muted">—</span>`;return`<span class="badge ${TEAM_COLORS[t]||'badge-gray'}">${t}</span>`}
function empIdx(name){return employees.findIndex(e=>e.name===name)}

let toastTimer;
function showToast(msg,type='success'){
  const el=document.getElementById('toast');
  el.className='toast toast-'+type;
  el.innerHTML=`<i class="ti ti-${type==='error'?'alert-circle':type==='info'?'brand-slack':'check'}"></i><span>${msg}</span>`;
  el.style.display='flex';clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.style.display='none',4000);
}

function updateStats(){
  const ins=employees.filter(e=>e.in);
  const connected=pairs.filter(p=>p.connected).length;
  const pending=pairs.filter(p=>!p.connected).length;
  const sIn=document.getElementById('stat-in');
  const sP=document.getElementById('stat-pairs');
  const sC=document.getElementById('stat-connected');
  const sPend=document.getElementById('stat-pending');
  if(sIn)sIn.textContent=ins.length;
  if(sP)sP.textContent=pairs.length;
  if(sC)sC.textContent=connected;
  if(sPend)sPend.textContent=pending;
}

function renderSlackBar(){
  const s=loadSettings();
  const bar=document.getElementById('slack-bar');
  if(!bar)return;
  if(!s.token){
    bar.innerHTML=currentUser?.role==='admin'
      ?`<div class="slack-status warn"><span class="slack-dot dot-warn"></span>Slack not configured — add your bot token in <a href="#" onclick="switchTab('settings');return false" style="color:inherit;font-weight:500">Settings</a>.</div>`
      :'';
  } else {
    bar.innerHTML=`<div class="slack-status ok"><span class="slack-dot dot-ok"></span>Slack connected · #${s.channel}</div>`;
  }
}

// ── Generate & render pairs ───────────────────────────────────────────────────
function pickQ(used){const avail=questions.map((_,i)=>i).filter(i=>!used.has(i));const pool=avail.length?avail:questions.map((_,i)=>i);return pool[Math.floor(Math.random()*pool.length)];}

function generatePairs(){
  const active=employees.filter(e=>e.in);
  if(active.length<2){showToast('Need at least 2 participating employees.','error');return;}
  const shuffled=[...active].sort(()=>Math.random()-.5);
  const assigned=new Set();pairs=[];const usedQ=new Set();
  for(let i=0;i<shuffled.length;i++){
    if(assigned.has(i))continue;
    const a=shuffled[i];let b=null,bi=-1;
    for(let j=i+1;j<shuffled.length;j++){if(!assigned.has(j)&&(shuffled[j].team!==a.team||!a.team||!shuffled[j].team)){b=shuffled[j];bi=j;break;}}
    if(!b){for(let j=i+1;j<shuffled.length;j++){if(!assigned.has(j)){b=shuffled[j];bi=j;break;}}}
    if(!b)continue;
    assigned.add(i);assigned.add(bi);
    const qi=pickQ(usedQ);usedQ.add(qi);
    pairs.push({a,b,question:questions[qi],qIdx:qi,connected:false,pairedAt:null});
  }
  renderPairsList();
  updateStats();
  showToast(`Generated ${pairs.length} pairs.`);
}

function toggleConnected(i){pairs[i].connected=!pairs[i].connected;renderPairsList();updateStats();}

function renderPairsList(){
  const el=document.getElementById('pairs-list-inner');
  if(!el)return;
  if(!pairs.length){el.innerHTML='<div class="empty">No pairs yet.</div>';return;}
  const s=loadSettings();
  const now=Date.now();
  const reminderMs=s.reminderDays*24*60*60*1000;
  const isAdmin=currentUser?.role==='admin';

  el.innerHTML=pairs.map((p,i)=>{
    const ai=empIdx(p.a.name),bi=empIdx(p.b.name);
    const isMine=p.a.email===currentUser?.email||p.b.email===currentUser?.email;
    const needsReminder=p.pairedAt&&!p.connected&&(now-p.pairedAt>=reminderMs);
    let statusBadge='';
    if(p.connected)statusBadge=`<span class="connected-badge"><i class="ti ti-check" style="font-size:10px"></i> Connected</span>`;
    else if(needsReminder)statusBadge=`<span class="reminder-badge"><i class="ti ti-bell" style="font-size:10px"></i> Reminder due</span>`;
    if(isMine)statusBadge+=`<span class="badge badge-purple">You</span>`;

    return`<div class="pair-card${p.connected?' connected':''}${isMine?' mine':''}">
      <div style="display:flex;gap:6px;flex-shrink:0">${avatarDiv(p.a.name,ai)}${avatarDiv(p.b.name,bi)}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap">
          <div class="pair-names">${p.a.name} &amp; ${p.b.name}</div>
          <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">${statusBadge}
            ${isAdmin?`<button class="btn btn-sm" onclick="toggleConnected(${i})"><i class="ti ti-${p.connected?'refresh':'check'}"></i> ${p.connected?'Unmark':'Mark connected'}</button>`:''}
          </div>
        </div>
        <div class="pair-meta">${teamBadge(p.a.team)}<span style="color:var(--border2)">&amp;</span>${teamBadge(p.b.team)}
          ${isAdmin?`<span style="color:var(--text3);font-size:11px">${p.a.email} · ${p.b.email}</span>`:''}
        </div>
        <div class="question-box" style="border-left-color:${CAT_COLORS[p.question.cat]||'#888'}">
          <span class="q-cat-label" style="color:${CAT_COLORS[p.question.cat]||'#888'}">${p.question.cat}</span>
          ${p.question.text}
        </div>
        ${isAdmin?`<div style="margin-top:8px"><button class="btn btn-sm" onclick="reshufflePair(${i})"><i class="ti ti-refresh"></i> New question</button></div>`:''}
      </div>
    </div>`;
  }).join('');
}

function reshufflePair(i){
  const used=new Set(pairs.map(p=>p.qIdx));used.delete(pairs[i].qIdx);
  const avail=questions.map((_,qi)=>qi).filter(qi=>!used.has(qi));
  const pool=avail.length?avail:questions.map((_,qi)=>qi);
  pairs[i].question=questions[pool[Math.floor(Math.random()*pool.length)]];
  pairs[i].qIdx=pool[Math.floor(Math.random()*pool.length)];
  renderPairsList();
}
function copyPairSummary(){
  if(!pairs.length){showToast('Generate pairings first.','error');return;}
  navigator.clipboard.writeText(pairs.map((p,i)=>`Pair ${i+1}: ${p.a.name} + ${p.b.name}\nQuestion: ${p.question.text}`).join('\n\n')).then(()=>showToast('Copied.'));
}

// ── Slack ─────────────────────────────────────────────────────────────────────
async function slackPost(ep,body){
  const s=loadSettings();
  if(!s.token)throw new Error('No token');
  const r=await fetch('https://slack.com/api/'+ep,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+s.token},body:JSON.stringify(body)});
  const d=await r.json();if(!d.ok)throw new Error(d.error||'Slack error');return d;
}
async function lookupSlackUser(email){try{const d=await slackPost('users.lookupByEmail',{email});return d.user?.id||null;}catch{return null;}}
function buildDM(p,t){return t.replace(/{name1}/g,p.a.name).replace(/{name2}/g,p.b.name).replace(/{email1}/g,p.a.email).replace(/{email2}/g,p.b.email).replace(/{question}/g,p.question.text);}

async function sendToSlack(){
  if(!pairs.length){showToast('Generate pairings first.','error');return;}
  const s=loadSettings();if(!s.token){showToast('Add Slack token in Settings.','error');return;}
  const btn=document.getElementById('btn-send-slack');
  btn.disabled=true;btn.innerHTML='<i class="ti ti-loader-2"></i> Sending...';
  try{
    const announce=pairs.map((p,i)=>`${i+1}. *${p.a.name}* (${p.a.team||'—'}) ↔ *${p.b.name}* (${p.b.team||'—'})`).join('\n');
    await slackPost('chat.postMessage',{channel:s.channel,text:`☕ *Coffee Chat pairings are in!*\n\n${announce}\n\nCheck your DMs for your icebreaker question. Happy chatting! 🎉`});
    let sent=0,failed=0;
    for(const p of pairs){
      const[u1,u2]=await Promise.all([lookupSlackUser(p.a.email),lookupSlackUser(p.b.email)]);
      const msg=buildDM(p,s.dmTemplate);
      if(u1&&u2){try{const ch=await slackPost('conversations.open',{users:`${u1},${u2}`});await slackPost('chat.postMessage',{channel:ch.channel.id,text:msg});sent++;}catch{failed++;}}
      else{if(u1){try{const ch=await slackPost('conversations.open',{users:u1});await slackPost('chat.postMessage',{channel:ch.channel.id,text:msg});sent++;}catch{failed++;}}if(u2){try{const ch=await slackPost('conversations.open',{users:u2});await slackPost('chat.postMessage',{channel:ch.channel.id,text:msg});sent++;}catch{failed++;}}}
      p.pairedAt=Date.now();
    }
    showToast(`Announced in #${s.channel}. ${sent} DMs sent.${failed?' '+failed+' failed.':''}`, 'info');
    renderPairsList();
  }catch(e){showToast('Slack error: '+e.message,'error');}
  finally{btn.disabled=false;btn.innerHTML='<i class="ti ti-brand-slack"></i> Send to Slack';}
}

async function sendReminders(){
  const pending=pairs.filter(p=>!p.connected);
  if(!pending.length){showToast('No pending pairs.','error');return;}
  const s=loadSettings();if(!s.token){showToast('Add Slack token in Settings.','error');return;}
  const btn=document.getElementById('btn-reminders');
  btn.disabled=true;btn.innerHTML='<i class="ti ti-loader-2"></i> Sending...';
  let sent=0,failed=0;
  for(const p of pending){
    const[u1,u2]=await Promise.all([lookupSlackUser(p.a.email),lookupSlackUser(p.b.email)]);
    const msg=buildDM(p,s.reminderTemplate);
    if(u1&&u2){try{const ch=await slackPost('conversations.open',{users:`${u1},${u2}`});await slackPost('chat.postMessage',{channel:ch.channel.id,text:msg});sent++;}catch{failed++;}}
  }
  showToast(`Reminders sent to ${sent} pairs.`,'info');
  btn.disabled=false;btn.innerHTML='<i class="ti ti-bell"></i> Send reminders';
}

async function testSlack(){
  const el=document.getElementById('test-result');el.textContent='Testing...';
  try{await slackPost('auth.test',{});el.style.color='var(--green-text)';el.textContent='✓ Connected';}
  catch(e){el.style.color='var(--red-text)';el.textContent='✗ '+e.message;}
}

// ── Approve ───────────────────────────────────────────────────────────────────
function renderApprove(){
  const el=document.getElementById('sec-approve');if(!el)return;
  const q=(document.getElementById('approve-search')?.value||'').toLowerCase();
  const tf=document.getElementById('approve-filter-team')?.value||'';

  const inCount=employees.filter(e=>e.in).length;
  const usedTeams=new Set(employees.map(e=>e.team).filter(Boolean));
  const teamOpts=TEAMS.filter(t=>usedTeams.has(t)).map(t=>`<option value="${t}"${tf===t?' selected':''}>${t}</option>`).join('');

  const filtered=employees.filter(e=>{
    if(q&&!e.name.toLowerCase().includes(q)&&!(e.team||'').toLowerCase().includes(q))return false;
    if(tf&&e.team!==tf)return false;
    return true;
  });

  let rows=filtered.map(e=>{
    const checked=approveChecked.has(e.email);
    return`<tr class="${e.in?'approved':''}">
      <td><input type="checkbox" class="cb" ${checked?'checked':''} onchange="toggleCheck('${e.email}',this.checked)" /></td>
      <td style="font-weight:500">${e.name}</td>
      <td>${teamBadge(e.team)}</td>
      <td class="emp-email">${e.email}</td>
      <td style="text-align:center">${e.in?`<span class="connected-badge"><i class="ti ti-check" style="font-size:10px"></i> Approved</span>`:`<span class="badge badge-gray">Not approved</span>`}</td>
    </tr>`;
  }).join('');

  el.innerHTML=`<div class="card">
    <div class="card-header">
      <div><div class="card-title">Bulk approve members</div><div class="card-sub">Check everyone to include, then click Approve selected.</div></div>
      <div style="display:flex;gap:8px"><button class="btn btn-sm" onclick="checkAll(true)"><i class="ti ti-check"></i> Select all</button><button class="btn btn-sm" onclick="checkAll(false)"><i class="ti ti-x"></i> Clear</button></div>
    </div>
    <div class="search-row">
      <div class="search-wrap"><i class="ti ti-search"></i><input class="search-input" id="approve-search" placeholder="Search name or team..." oninput="renderApprove()" value="${q}" /></div>
      <select class="input" id="approve-filter-team" style="width:150px;flex-shrink:0" onchange="renderApprove()"><option value="">All teams</option>${teamOpts}</select>
    </div>
    <div style="margin-bottom:12px;font-size:12px;color:var(--text2)"><strong>${inCount}</strong> of <strong>${employees.length}</strong> approved
      <div class="progress-bar"><div class="progress-fill" style="width:${Math.round(inCount/employees.length*100)}%"></div></div>
    </div>
    <div style="overflow:hidden;border-radius:var(--r-md);border:0.5px solid var(--border)">
      <table class="approve-table"><thead><tr>
        <th><input type="checkbox" class="cb" onchange="checkAllVisible(this.checked)" /></th>
        <th>Name</th><th>Team</th><th>Email</th><th style="text-align:center">Status</th>
      </tr></thead><tbody>${rows}</tbody></table>
    </div>
    <div style="margin-top:12px;display:flex;gap:8px">
      <button class="btn btn-green" onclick="approveSelected()"><i class="ti ti-check"></i> Approve selected</button>
      <button class="btn" onclick="unapproveSelected()"><i class="ti ti-x"></i> Remove selected</button>
    </div>
  </div>`;
}

function toggleCheck(email,v){v?approveChecked.add(email):approveChecked.delete(email);}
function checkAll(v){approveChecked=v?new Set(employees.map(e=>e.email)):new Set();renderApprove();}
function checkAllVisible(v){document.querySelectorAll('.approve-table tbody .cb').forEach(cb=>{const em=cb.closest('tr').querySelector('.emp-email').textContent;v?approveChecked.add(em):approveChecked.delete(em);cb.checked=v;});}
function approveSelected(){let c=0;employees.forEach(e=>{if(approveChecked.has(e.email)){e.in=true;c++;}});approveChecked.clear();renderApprove();updateStats();showToast(`${c} member${c!==1?'s':''} approved.`);}
function unapproveSelected(){let c=0;employees.forEach(e=>{if(approveChecked.has(e.email)){e.in=false;c++;}});approveChecked.clear();renderApprove();updateStats();showToast(`${c} member${c!==1?'s':''} removed.`);}

// ── Employees ─────────────────────────────────────────────────────────────────
function renderEmployees(){
  const el=document.getElementById('sec-employees');if(!el)return;
  const q='';const tf='';const sf='';
  const usedTeams=new Set(employees.map(e=>e.team).filter(Boolean));
  const teamFilterOpts=TEAMS.filter(t=>usedTeams.has(t)).map(t=>`<option value="${t}">${t}</option>`).join('');

  el.innerHTML=`<div class="legend"><span><span class="legend-dot" style="background:var(--green)"></span>Participating</span><span><span class="legend-dot" style="background:#ccc"></span>Opted out</span></div>
  <div class="search-row">
    <div class="search-wrap"><i class="ti ti-search"></i><input class="search-input" id="emp-search" placeholder="Search..." oninput="filterEmployees()" /></div>
    <select class="input" id="filter-team" style="width:150px;flex-shrink:0" onchange="filterEmployees()"><option value="">All teams</option>${teamFilterOpts}</select>
    <select class="input" id="filter-status" style="width:140px;flex-shrink:0" onchange="filterEmployees()"><option value="">All</option><option value="in">Participating</option><option value="out">Opted out</option><option value="noteam">No team</option></select>
  </div>
  <div class="card" style="padding:0;overflow:hidden"><div id="emp-table-wrap"></div></div>
  <div style="margin-top:8px;display:flex;gap:8px"><button class="btn btn-sm" onclick="setAllIn(true)">Opt everyone in</button><button class="btn btn-sm" onclick="setAllIn(false)">Opt everyone out</button></div>`;
  filterEmployees();
}

function filterEmployees(){
  const q=(document.getElementById('emp-search')?.value||'').toLowerCase();
  const tf=document.getElementById('filter-team')?.value||'';
  const sf=document.getElementById('filter-status')?.value||'';
  const filtered=employees.filter(e=>{
    if(q&&!e.name.toLowerCase().includes(q)&&!e.email.toLowerCase().includes(q))return false;
    if(tf&&e.team!==tf)return false;
    if(sf==='in'&&!e.in)return false;
    if(sf==='out'&&e.in)return false;
    if(sf==='noteam'&&(e.team||!e.in))return false;
    return true;
  });
  const wrap=document.getElementById('emp-table-wrap');
  if(!wrap)return;
  if(!filtered.length){wrap.innerHTML='<div class="empty">No match.</div>';return;}
  let html=`<table class="emp-table"><thead><tr><th></th><th>Name</th><th>Email</th><th>Team</th><th style="text-align:center">Round</th><th>Invite</th></tr></thead><tbody>`;
  filtered.forEach(e=>{
    const ri=empIdx(e.name);
    const opts=TEAMS.map(t=>`<option value="${t}"${e.team===t?' selected':''}>${t}</option>`).join('');
    const pill=e.in?`<button class="pill-in" onclick="toggleIn(${ri})"><i class="ti ti-check" style="font-size:10px"></i> In</button>`:`<button class="pill-out" onclick="toggleIn(${ri})"><i class="ti ti-minus" style="font-size:10px"></i> Out</button>`;
    const subj=encodeURIComponent('Join our Coffee Chat!');
    const bod=encodeURIComponent(`Hi ${e.name.split(' ')[0]},\n\nWe're running a coffee chat program at TMO to help teams connect. Hope you'll join us!\n\nBen`);
    html+=`<tr style="${e.in?'':'opacity:0.5'}"><td>${avatarDiv(e.name,ri)}</td><td style="font-weight:500">${e.name}</td><td class="emp-email">${e.email}</td>
      <td><select class="input" style="width:145px;padding:4px 6px;font-size:12px" onchange="setTeam(${ri},this.value)"><option value="">— unset —</option>${opts}</select></td>
      <td style="text-align:center">${pill}</td>
      <td><a class="invite-btn" href="mailto:${e.email}?subject=${subj}&body=${bod}"><i class="ti ti-mail" style="font-size:11px"></i> Invite</a></td></tr>`;
  });
  html+=`</tbody></table>`;
  wrap.innerHTML=html;
  updateStats();
}

function setTeam(i,t){employees[i].team=t;updateStats();}
function toggleIn(i){employees[i].in=!employees[i].in;filterEmployees();}
function setAllIn(v){employees.forEach(e=>e.in=v);filterEmployees();}

// ── Questions ─────────────────────────────────────────────────────────────────
const catBadge={Work:'badge-blue',Personal:'badge-teal',Fun:'badge-amber',Career:'badge-purple','Cross-team':'badge-pink'};
function renderQuestions(){
  const el=document.getElementById('sec-questions');if(!el)return;
  el.innerHTML=`<div class="card"><div class="card-header"><span class="card-title">Icebreaker question bank</span><button class="btn btn-sm" onclick="addQuestion()"><i class="ti ti-plus"></i> Add</button></div><div id="q-list"></div></div>`;
  document.getElementById('q-list').innerHTML=questions.map((q,i)=>`
    <div class="q-item"><div style="flex:1"><div style="font-size:13px;margin-bottom:4px">${q.text}</div><span class="badge ${catBadge[q.cat]||'badge-gray'}">${q.cat}</span></div>
    <button class="btn btn-sm" onclick="removeQuestion(${i})"><i class="ti ti-trash"></i></button></div>`).join('');
}
function removeQuestion(i){questions.splice(i,1);renderQuestions();}
function addQuestion(){const t=prompt('New question:');if(!t?.trim())return;const c=prompt('Category (Work/Personal/Fun/Career/Cross-team):')||'Personal';questions.push({text:t.trim(),cat:c.trim()});renderQuestions();}

function renderSettings(){

  const s=loadSettings();
  el.innerHTML=`
  <div class="card">
    <div class="card-header"><span class="card-title"><i class="ti ti-brand-slack" style="color:var(--slack)"></i> Slack configuration</span></div>
    <div class="settings-row"><div class="settings-label">Bot token</div><div class="settings-hint">From api.slack.com → OAuth & Permissions. Needs <code>chat:write</code>, <code>im:write</code>, <code>users:read</code>, <code>users:read.email</code>.</div><input class="input" id="slack-token" type="password" placeholder="xoxb-..." value="${s.token}" oninput="saveSettings()" /></div>
    <div class="settings-row"><div class="settings-label">Announcement channel</div><div class="settings-hint">Channel name without #. Bot must be invited to the channel.</div><input class="input" id="slack-channel" placeholder="coffee-chat" value="${s.channel}" oninput="saveSettings()" /></div>
    <div class="settings-row"><div class="settings-label">Reminder delay (days)</div><input class="input" id="reminder-days" type="number" value="${s.reminderDays}" min="1" max="30" style="width:100px" oninput="saveSettings()" /></div>
    <div style="display:flex;align-items:center;gap:10px"><button class="btn btn-primary" onclick="testSlack()"><i class="ti ti-send"></i> Test connection</button><span id="test-result" style="font-size:13px;color:var(--text2)"></span></div>
  </div>
  <div class="card">
    <div class="card-header"><span class="card-title">Admin PIN</span></div>
    <div class="settings-row"><div class="settings-label">Change PIN</div><div class="settings-hint">Enter a new 4-digit PIN and click Save.</div>
      <div style="display:flex;gap:8px;align-items:center"><input class="input" id="new-pin" type="password" inputmode="numeric" maxlength="4" placeholder="New 4-digit PIN" style="width:160px" /><button class="btn btn-primary btn-sm" onclick="saveSettings()">Save PIN</button><span id="pin-save-msg" style="font-size:12px;color:var(--green-text)"></span></div>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><span class="card-title">DM message template</span></div>
    <div class="settings-hint" style="margin-bottom:8px">Use <code>{name1}</code>, <code>{name2}</code>, <code>{email1}</code>, <code>{email2}</code>, <code>{question}</code>.</div>
    <textarea class="input" id="dm-template" rows="7">${s.dmTemplate}</textarea>
  </div>
  <div class="card">
    <div class="card-header"><span class="card-title">Reminder message template</span></div>
    <textarea class="input" id="reminder-template" rows="5">${s.reminderTemplate}</textarea>
    <div style="margin-top:10px"><button class="btn btn-primary" onclick="saveSettings()"><i class="ti ti-device-floppy"></i> Save all settings</button></div>
  </div>`;
}
</script>
